[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    integration: end-to-end tests that wire real components together
    qdrant: requires a real Qdrant instance (Docker or QDRANT_TEST_URL)
    live: hits the live OpenAI API (opt-in, costs money)
filterwarnings =
    ignore::DeprecationWarning
